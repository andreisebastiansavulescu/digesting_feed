name: Pull Request Checks

on:
  pull_request:
    branches:
      - develop

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install uv
          uv pip install -r pyproject.toml --system

      - name: 🔍 Run pylint
        run: |
          pylint digesting_feed

      - name: 🔍 Run ruff
        run: |
          ruff check digesting_feed

      - name: 🔍 Run black check
        run: |
          black --check digesting_feed
